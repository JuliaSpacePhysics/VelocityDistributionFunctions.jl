name: Benchmarks

on:
  pull_request_target:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'CHANGELOG.md'
      - 'test/**'
      - 'docs/**'
permissions:
  pull-requests: write    # action needs to post a comment

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: MilesCranmer/AirspeedVelocity.jl@action-v1